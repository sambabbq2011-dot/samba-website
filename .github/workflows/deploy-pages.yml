name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure GitHub Pages URL
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repository="${GITHUB_REPOSITORY##*/}"
          if [[ "$repository" == *.github.io ]]; then
            site_url="https://${owner}.github.io"
          else
            site_url="https://${owner}.github.io/${repository}"
          fi
          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=${site_url}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_BOOKING_WEB_APP_URL=${{ vars.BOOKING_WEB_APP_URL }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm typecheck

      - name: Build static website
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
